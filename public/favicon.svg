<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Modern Orange Gradient -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9052" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
  </defs>
  
  <!-- Outer glowing ring / helm-inspired gear style (minimalist) -->
  <circle cx="256" cy="256" r="220" stroke="url(#orangeGrad)" stroke-width="16" fill="none" opacity="0.15" />
  
  <!-- Main Ship Wheel / Code Brackets combination -->
  <!-- Inner Ring -->
  <circle cx="256" cy="256" r="140" stroke="url(#orangeGrad)" stroke-width="24" fill="none" />
  
  <!-- Spokes (8 handles for a helm wheel, representing steering/control/captain) -->
  <g stroke="url(#orangeGrad)" stroke-width="24" stroke-linecap="round">
    <!-- Top & Bottom -->
    <line x1="256" y1="50" x2="256" y2="116" />
    <line x1="256" y1="396" x2="256" y2="462" />
    <!-- Left & Right -->
    <line x1="50" y1="256" x2="116" y2="256" />
    <line x1="396" y1="256" x2="462" y2="256" />
    <!-- Diagonals -->
    <line x1="110" y1="110" x2="157" y2="157" />
    <line x1="355" y1="355" x2="402" y2="402" />
    <line x1="402" y1="110" x2="355" y2="157" />
    <line x1="157" y1="355" x2="110" y2="402" />
  </g>
  
  <!-- Center: Stylized Code Brackets (representing Code/Developer) -->
  <path d="M 210 200 L 160 256 L 210 312" stroke="url(#orangeGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <path d="M 302 200 L 352 256 L 302 312" stroke="url(#orangeGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <line x1="270" y1="180" x2="242" y2="332" stroke="url(#orangeGrad)" stroke-width="24" stroke-linecap="round" />
</svg>